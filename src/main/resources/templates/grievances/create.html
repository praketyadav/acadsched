<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Submit Grievance - AcadSched</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/}" class="nav-brand">AcadSched</a>
            <ul class="nav-menu">
                <li><a th:href="@{/dashboard}">Dashboard</a></li>
                <li><a th:href="@{/grievances}" class="active">Grievances</a></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1><i class="ph ph-plus-circle"></i> Submit New Grievance</h1>

        <div style="max-width: 600px; margin: 24px auto; background: var(--bg-card); padding: 32px; border-radius: var(--radius); border: 1px solid var(--border);">
            <form th:action="@{/grievances/new}" th:object="${grievance}" method="post">
                
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" th:field="*{title}" required placeholder="Enter grievance title">
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" th:field="*{category}" required>
                        <option value="">Select Category</option>
                        <option value="ACADEMIC">Academic</option>
                        <option value="INFRASTRUCTURE">Infrastructure</option>
                        <option value="ADMINISTRATIVE">Administrative</option>
                        <option value="HOSTEL">Hostel</option>
                        <option value="LIBRARY">Library</option>
                        <option value="TRANSPORT">Transport</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" th:field="*{description}" rows="6" required placeholder="Describe your concern in detail"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Submit Grievance</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a th:href="@{/grievances}"><i class="ph ph-arrow-left"></i> Back to Grievances</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 AcadSched. All rights reserved.</p>
    </footer>
</body>
</html>
