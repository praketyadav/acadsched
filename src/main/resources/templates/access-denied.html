<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied - AcadSched</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body>
    <div class="container" style="text-align: center; padding: 100px 20px;">
        <div style="font-size: 5rem; color: var(--danger); margin-bottom: 8px;"><i class="ph ph-shield-warning"></i></div>
        <h1 style="font-size: 4rem; color: var(--danger);">403</h1>
        <h2>Access Denied</h2>
        <p style="color: var(--text-secondary); margin: 12px 0;">You don't have permission to access this resource.</p>
        <div style="margin-top: 30px; display: flex; gap: 12px; justify-content: center;">
            <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
            <a th:href="@{/}" class="btn btn-secondary">Go to Home</a>
        </div>
    </div>
</body>
</html>
